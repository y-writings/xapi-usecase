name: "[00] Weekly merged PRs report"

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      calver_date:
        description: Optional override in YYYY.MM.DD format for manual recovery.
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: weekly-changelog-update-main
  cancel-in-progress: false

jobs:
  update-changelog:
    name: Update weekly changelog and enable auto-merge
    runs-on: ubuntu-latest
    steps:
      - name: Create pull request creator GitHub App token
        id: pr-creator-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ vars.PR_CREATOR_APP_ID }}
          private-key: ${{ secrets.PR_CREATOR_APP_PRIVATE_KEY }}

      - name: Check out repository for changelog generation
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.pr-creator-token.outputs.token }}

      - name: Create weekly CalVer tag through GitHub API
        id: calver-tag
        uses: y-writings/calver-beacon-action@0ba68eee60be71b3549212bf896fac07df928d4d # v2026.05.25
        with:
          calver_date: ${{ inputs.calver_date }}
          tag_prefix: weekly-
          target_ref: main
          github_token: ${{ steps.pr-creator-token.outputs.token }}

      - name: Prepare git-cliff inputs
        id: cliff-range
        if: ${{ steps.calver-tag.outputs.created == 'true' }}
        env:
          TAG: ${{ steps.calver-tag.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.calver-tag.outputs.previous_tag }}
        run: |
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"

          if [ -n "${PREVIOUS_TAG}" ]; then
            echo "range=${PREVIOUS_TAG}..${TAG}" >> "${GITHUB_OUTPUT}"
          else
            echo "range=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Generate WEEKLY_MERGED_PULL_REQUESTS.md from release tag range
        if: ${{ steps.calver-tag.outputs.created == 'true' }}
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --verbose --tag ${{ steps.calver-tag.outputs.tag }} --output WEEKLY_MERGED_PULL_REQUESTS.md ${{ steps.cliff-range.outputs.range }}
          github_token: ${{ steps.pr-creator-token.outputs.token }}

      - name: Create or update changelog pull request
        id: changelog-pull-request
        if: ${{ steps.calver-tag.outputs.created == 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.pr-creator-token.outputs.token }}
          add-paths: |
            WEEKLY_MERGED_PULL_REQUESTS.md
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          branch: automation/update-changelog
          base: main
          commit-message: "docs(changelog): update changelog"
          delete-branch: true
          title: "docs(changelog): update changelog"
          body: |
            ## Summary
            - regenerate `WEEKLY_MERGED_PULL_REQUESTS.md` from `${{ steps.cliff-range.outputs.range }}`
            - generated after `${{ steps.calver-tag.outputs.tag }}` was created on `main`
            - auto-merge is enabled after automated validation

      - name: Create changelog approver GitHub App token
        id: approver-token
        if: ${{ steps.changelog-pull-request.outputs.pull-request-number != '' }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2.2.2
        with:
          app-id: ${{ vars.PR_APPROVER_APP_ID }}
          private-key: ${{ secrets.PR_APPROVER_APP_PRIVATE_KEY }}

      - name: Verify, approve, and enable auto-merge for changelog pull request
        if: ${{ steps.changelog-pull-request.outputs.pull-request-number != '' }}
        uses: y-writings/pr-seal-action@a858db3f9571028282a2b146b84a2b2c65ad0a07 # v0.1.0
        with:
          repository: ${{ github.repository }}
          pull-request-number: ${{ steps.changelog-pull-request.outputs.pull-request-number }}
          expected-author: y-writings-pr-creator-bot
          allowed-paths: |
            WEEKLY_MERGED_PULL_REQUESTS.md
          approve-token: ${{ steps.approver-token.outputs.token }}
          merge-token: ${{ steps.pr-creator-token.outputs.token }}
          merge-method: squash
          approve-body: Automated approval for WEEKLY_MERGED_PULL_REQUESTS.md-only release PR.
